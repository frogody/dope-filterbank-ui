<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="plugin-core">
    <!-- Top Cyan Line Track & Glow -->
    <div class="header-line-track">
      <div class="header-line"></div>
    </div>
    
    <!-- Top Display Panels -->
    <div class="header-panels">
      <div class="brand-logo">
        <span class="brand-name">D&Oslash;PE</span>
        <span class="brand-sub">FILTERBANK</span>
      </div>
      
      <select class="custom-select top-selector"><option>SERIAL</option><option>PARALLEL</option></select>
      <select class="custom-select top-selector"><option>SOFT CLIP</option><option>HARD CLIP</option></select>
    </div>

    <!-- Main Grid Array -->
    <div class="main-grid">
      <!-- Left Column / Filter 1 -->
      <div class="panel filter1-panel">
        <div class="screw top-left"></div><div class="screw top-right"></div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
        
        <div class="panel-label overlay-label">FILTER 1</div>
        
        <div class="filter-controls">
          <div class="knob-container large">
            <div id="f1-cutoff" class="knob has-ring" data-min="10" data-max="48" data-value="24" data-angle="180"></div>
            <div class="knob-label">CUTOFF</div>
            <div class="knob-markers">
              <span class="m-left">10</span><span class="m-right">48</span>
            </div>
          </div>
          
          <div class="filter-sub-controls">
            <select class="custom-select"><option>Reso Mono</option><option>Reso Poly</option></select>
            <div class="knob-container small">
              <div id="f1-reso" class="knob has-ring" data-min="0" data-max="10" data-value="5" data-angle="180"></div>
              <div class="knob-label">RESO</div>
              <div class="knob-markers full">
                <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Left Column / Filter 2 -->
      <div class="panel filter2-panel">
        <div class="screw top-left"></div><div class="screw top-right"></div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
        
        <div class="panel-label overlay-label">FILTER 2</div>
        
        <div class="filter-controls">
          <div class="knob-container large">
            <div id="f2-cutoff" class="knob has-ring" data-min="10" data-max="48" data-value="10" data-angle="45"></div>
            <div class="knob-label">CUTOFF</div>
            <div class="knob-markers">
              <span class="m-left">10</span><span class="m-right">48</span>
            </div>
          </div>
          
          <div class="filter-sub-controls">
            <select class="custom-select"><option>Reso Mono</option><option>Reso Poly</option></select>
            <div class="knob-container small">
              <div id="f2-reso" class="knob has-ring" data-min="0" data-max="10" data-value="3" data-angle="120"></div>
              <div class="knob-label">RESO</div>
              <div class="knob-markers full">
                <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Top Right / Frequency Graph -->
      <div class="panel graph-panel">
         <div class="graph-wrapper">
           <div class="graph-y-axis">
             <span>+10</span><span>+5</span><span>0</span><span>-5</span><span>-10</span><span>-15</span><span>-20</span>
             <div class="graph-label-y">FREQUENCY RESPONSE</div>
           </div>
           <canvas id="freq-canvas" width="460" height="150"></canvas>
           <div class="graph-x-axis">
             <span>100</span><span>500</span><span>1k</span><span>5k</span><span>10k</span>
           </div>
         </div>
         <div class="lcd-glare"></div>
      </div>

      <!-- Bottom Middle / Drive, Mix, Tone -->
      <div class="panel drive-panel">
        <div class="screw top-left"></div><div class="screw top-right"></div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
        
        <div class="knobs-row">
          <div class="knob-container small">
            <div class="knob has-ring" data-min="0" data-max="10" data-value="0" data-angle="45"></div>
            <div class="knob-label">DRIVE</div>
            <div class="knob-markers full"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
          </div>
          <div class="knob-container small">
            <div class="knob has-ring" data-min="0" data-max="10" data-value="5" data-angle="180"></div>
            <div class="knob-label">MIX</div>
            <div class="knob-markers full"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
          </div>
          <div class="knob-container small">
            <div class="knob has-ring" data-min="0" data-max="10" data-value="10" data-angle="315"></div>
            <div class="knob-label">TONE</div>
            <div class="knob-markers full"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
          </div>
        </div>
      </div>

      <!-- Bottom Right / Limiter -->
      <div class="panel limiter-panel">
        <div class="screw top-left"></div><div class="screw top-right"></div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
        
        <div class="panel-label overlay-label">LIMITER</div>
        <select class="custom-select wide"><option>Hard Limit</option><option>Soft Limit</option><option>Bypass</option></select>
        
        <div class="knobs-row">
          <div class="knob-container small">
            <div class="knob has-ring" data-min="-40" data-max="10" data-value="-20" data-angle="90"></div>
            <div class="knob-label">THRESH</div>
            <div class="knob-markers"><span class="m-left">-40</span><span class="m-right">+10dB</span></div>
          </div>
          <div class="knob-container small">
            <div class="knob has-ring" data-min="10" data-max="2500" data-value="1000" data-angle="220"></div>
            <div class="knob-label">RELEASE</div>
            <div class="knob-markers"><span class="m-left">10ms</span><span class="m-right">2.5s</span></div>
          </div>
        </div>
      </div>

      <!-- Bottom Far Right / Dry/Wet -->
      <div class="panel drywet-panel">
        <div class="screw top-left"></div><div class="screw top-right"></div>
        <div class="screw bottom-left"></div><div class="screw bottom-right"></div>
        
        <div class="knob-container text-only-markers small">
          <div class="knob has-ring" data-min="0" data-max="100" data-value="50" data-angle="180"></div>
          <div class="knob-label">DRY/WET</div>
          <div class="knob-markers"><span class="m-left">DRY</span><span class="m-right">WET</span></div>
        </div>
        
        <div class="forward-icon">&raquo;</div>
      </div>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
